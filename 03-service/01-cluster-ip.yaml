apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx
    demo: service
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80
  - name: alpine-container
    image: alpine
    command: ["sh", "-c", "echo Hello Kubernetes! && sleep 3600"]
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector: #the selector is used to find the pods that will be exposed by this service
    app: nginx
    demo: service #selected pods must have these labels /like filters applied to pods/
  ports:
      - protocol: TCP
        port: 80 #service port that will be exposed to the outside world
        targetPort: 80 #container port that the service will forward traffic to